name: Daily Regulatory Monitor

on:
  schedule:
    - cron: '0 5 * * *'  # 9:00 AM Bahrain time (UTC+4)
  workflow_dispatch:       # allows manual trigger from GitHub

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FETCH_MODE: live
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=src python3 src/monitor.py

      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest
          path: output/
          retention-days: 7

      - name: Notify digest ready
        run: |
          echo "Digest written to output/ and uploaded as artifact."
          echo "Download from Actions → this run → Artifacts to review before posting to Substack."

      - name: Debug log
        if: always()
        run: |
          cat /home/runner/work/regmonitor/regmonitor/logs/observation_log.jsonl | python3 -c "
          import sys, json
          for line in sys.stdin:
              try:
                  e = json.loads(line)
                  if e.get('event_type') in ['SOURCE_FAILURE', 'ERROR']:
                      print(e['timestamp'], e['event_type'], e['severity'])
                      print(' ', e.get('message',''))
              except: pass
          "
